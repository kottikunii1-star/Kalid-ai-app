index.js const express = require("express");
const cors = require("cors");
require("dotenv").config();

const app = express();
app.use(cors());
app.use(express.json());

// 1. FUULA FUULDURAA (HTML)
app.get("/", (req, res) => {
    res.send(`
<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalid AI Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 3px solid #10b981; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { color: #10b981; font-size: 22px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 16px; line-height: 1.5; }
        .user { align-self: flex-end; background: #10b981; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; }
        .input-box { background: #1e293b; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; outline: none; font-size: 16px; background: #0f172a; color: white; border: 1px solid #334155; }
        button { background: #10b981; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #059669; }
        button:disabled { background: #475569; }
    </style>
</head>
<body>
    <header><h1>Kalid AI Pro</h1></header>
    <div id="chat"><div class="msg ai">Akkam, ani Kalid AI Pro dha. Maal siin gargaaru?</div></div>
    <div class="input-box">
        <input type="text" id="msgIn" placeholder="Ergaa barreessi..." autocomplete="off">
        <button id="btn" onclick="send()">Ergi</button>
    </div>
    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("msgIn");
        const btn = document.getElementById("btn");

        async function send() {
            const text = input.value.trim();
            if(!text) return;

            chat.innerHTML += '<div class="msg user">' + text + '</div>';
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            btn.disabled = true;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                chat.innerHTML += '<div class="msg ai">' + data.reply + '</div>';
            } catch (e) {
                chat.innerHTML += '<div class="msg ai">Dogoggora uumameera.</div>';
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
    </script>
</body>
</html>
    `);
});

// 2. BACKEND API
app.post("/api/chat", async (req, res) => {
    try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + process.env.OPENAI_API_KEY
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: "Ati Kalid AI Pro dha. Afaan Oromoo qofaan deebii gabaabaa kenni." },
                    { role: "user", content: req.body.message }
                ]
            })
        });
        const data = await response.json();
        res.json({ reply: data.choices[0].message.content });
    } catch (e) {
        res.status(500).json({ reply: "Dhiifama, dogoggora server!" });
    }
});

// Vercel koodii kana akka dubbisuuf export godhi
module.exports = app;

const PORT = process.env.PORT || 5000;
app.listen(PORT, () => console.log("Hojjechaa jira..."));
